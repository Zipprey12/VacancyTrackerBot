databaseChangeLog:
  - changeSet:
      id: 3
      author: vacancy-tracker
      changes:
        - createTable:
            tableName: regions
            columns:
              - column:
                  name: code
                  type: INTEGER
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(128)
                  constraints:
                    nullable: false

              - renameColumn:
                  tableName: search_filters
                  oldColumnName: region_id
                  newColumnName: region_code
                  columnDataType: INTEGER

              - addForeignKeyConstraint:
                  baseTableName: search_filters
                  baseColumnNames: region_code
                  constraintName: fk_search_filters_region
                  referencedTableName: regions
                  referencedColumnNames: code

