logging:
  level:
    vacancy_tracker: DEBUG

server:
  port: 8088

bot:
  name: ${BOT_NAME}
  token: ${BOT_TOKEN}

superjob:
  app-id: ${SUPER_JOB_APP_ID}
  secret-key: ${SUPER_JOB_SECRET}
  api:
    vacancies-url: https://api.superjob.ru/2.0/vacancies/
    companies-url: https://api.superjob.ru/2.0/clients/
    regions-url: https://api.superjob.ru/2.0/regions/
    cities-url: https://api.superjob.ru/2.0/towns/

trudvsem:
  api:
    base-url: http://opendata.trudvsem.ru/api/v1

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vacancy_tracker}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml